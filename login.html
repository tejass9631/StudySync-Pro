<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudySync Pro</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* ================= BACKGROUND ================= */

body {
  overflow: hidden;
  background: #020617;
}

/* ================= CANVAS ================= */

#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* ================= CARD ================= */

.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 360px;
  padding: 30px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border-radius: 20px;

  box-shadow: 0 0 60px rgba(139,92,246,0.3);
  animation: fade 0.8s ease;
}

@keyframes fade {
  from {opacity: 0; transform: translate(-50%, -40%);}
  to {opacity: 1; transform: translate(-50%, -50%);}
}

/* ================= LOGO ================= */

.logo-box {
  text-align: center;
  margin-bottom: 20px;
  animation: logoEntry 1s ease;
}

.logo-text {
  font-size: 28px;
  font-weight: bold;

  background: linear-gradient(90deg,#6366f1,#a855f7,#ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow: 0 0 20px rgba(168,85,247,0.4);
}

/* entry animation */

@keyframes logoEntry {
  from {
    opacity: 0;
    transform: translateY(-40px) scale(0.9);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* ================= TABS ================= */

.tabs {
  display: flex;
  justify-content: space-around;
  margin-bottom: 15px;
}

.tabs div {
  color: #aaa;
  cursor: pointer;
  padding: 8px;
  transition: 0.3s;
}

.tabs div:hover {
  color: #fff;
}

.tabs .active {
  color: #fff;
  border-bottom: 2px solid #a855f7;
}

/* ================= INPUT ================= */

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  outline: none;

  background: rgba(255,255,255,0.12);
  color: white;
}

/* ================= BUTTON ================= */

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;

  background: linear-gradient(90deg,#6366f1,#a855f7);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* ================= MESSAGE ================= */

#msg {
  text-align: center;
  margin-top: 10px;
  color: #fff;
  font-size: 14px;
}

/* ================= UTILITY ================= */

.hidden {
  display: none;
}

.link {
  text-align: right;
  font-size: 12px;
  color: #aaa;
  cursor: pointer;
}

.link:hover {
  color: #fff;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="card">

  <!-- LOGO -->

  <div class="logo-box">
    <div class="logo-text">StudySync Pro</div>
  </div>

  <!-- TABS -->

  <div class="tabs">
    <div id="loginTab" class="active" onclick="showLogin()">Login</div>
    <div id="signupTab" onclick="showSignup()">Signup</div>
  </div>

  <!-- LOGIN -->

  <div id="loginBox">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <div class="link" onclick="forgot()">Forgot Password?</div>

    <button onclick="login()">Login</button>
  </div>

  <!-- SIGNUP -->

  <div id="signupBox" class="hidden">
    <input id="sEmail" placeholder="Email">
    <input id="sPassword" type="password" placeholder="Password">
    <button onclick="signup()">Create Account</button>
  </div>

  <p id="msg"></p>
</div>

<!--  BACKGROUND ANIMATION -->

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const colors = ["#6366f1","#8b5cf6","#a855f7","#ec4899"];

  for (let i = 0; i < colors.length; i++) {
    ctx.beginPath();

    for (let x = 0; x < canvas.width; x++) {
      let y =
        Math.sin(x * 0.008 + t + i) * 50 +
        Math.cos(x * 0.01 + t * 0.8 + i) * 30 +
        canvas.height / 2;

      ctx.lineTo(x, y);
    }

    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.closePath();

    ctx.fillStyle = colors[i];
    ctx.globalAlpha = 0.08;
    ctx.fill();
  }

  t += 0.01;
  requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

<!--  Firebase logic -->

<script type="module">
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const auth = getAuth();

// 🔥 FORCE LOGOUT WHEN LOGIN PAGE OPENS

onAuthStateChanged(auth, (user) => {
  if (user) {
    signOut(auth);
  }
});
</script>

</body>
</html>

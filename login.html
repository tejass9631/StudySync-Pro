<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudySync Pro</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  overflow: hidden;
  background: #020617;
}

#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(360px, 92vw);
  padding: clamp(20px, 5vw, 30px);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border-radius: 20px;
  box-shadow: 0 0 60px rgba(139,92,246,0.3);
}

.logo-box {
  text-align: center;
  margin-bottom: 20px;
}

.logo-text {
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(90deg,#6366f1,#a855f7,#ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tabs {
  display: flex;
  justify-content: space-around;
  margin-bottom: 15px;
}

.tabs div {
  color: #aaa;
  cursor: pointer;
  padding: 8px;
}

.tabs .active {
  color: #fff;
  border-bottom: 2px solid #a855f7;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.12);
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#6366f1,#a855f7);
  color: white;
  cursor: pointer;
}

#msg {
  text-align: center;
  margin-top: 10px;
  color: #fff;
  font-size: 14px;
}

.hidden {
  display: none;
}

.link {
  text-align: right;
  font-size: 12px;
  color: #aaa;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="card">

  <div class="logo-box">
    <div class="logo-text">StudySync Pro</div>
  </div>

  <div class="tabs">
    <div id="loginTab" class="active" onclick="showLogin()">Login</div>
    <div id="signupTab" onclick="showSignup()">Signup</div>
  </div>

  <div id="loginBox">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <div class="link" onclick="forgot()">Forgot Password?</div>
    <button onclick="login()">Login</button>
  </div>

  <div id="signupBox" class="hidden">
    <input id="sEmail" placeholder="Email">
    <input id="sPassword" type="password" placeholder="Password">
    <button onclick="signup()">Create Account</button>
  </div>

  <p id="msg"></p>
</div>

<!-- BACKGROUND -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const colors = ["#6366f1","#8b5cf6","#a855f7","#ec4899"];

  for (let i = 0; i < colors.length; i++) {
    ctx.beginPath();

    for (let x = 0; x < canvas.width; x++) {
      let y =
        Math.sin(x * 0.008 + t + i) * 50 +
        Math.cos(x * 0.01 + t * 0.8 + i) * 30 +
        canvas.height / 2;

      ctx.lineTo(x, y);
    }

    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.closePath();

    ctx.fillStyle = colors[i];
    ctx.globalAlpha = 0.08;
    ctx.fill();
  }

  t += 0.01;
  requestAnimationFrame(draw);
}

draw();
</script>



<!-- MAIN APP -->
<script type="module" src="app.js"></script>

</body>
</html>

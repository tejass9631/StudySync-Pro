<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background: radial-gradient(circle at top left, #0c1027, #050816);
  color:#fff;
  
  justify-content:center;
  padding:30px 0;
  scroll-behavior:smooth;
}
.wrapper{
  width:100%;
  max-width:1600px;
  margin:auto;        /* center */
  padding:0 30px;
}


.calendar{
  display:flex;
  flex-direction:column;
  height:100%;
}


.top{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}


/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.header h1{
  font-size:28px;
  font-weight:700;
}

.header p{
  font-size:13px;
  color:#8c90b5;
  margin-top:4px;
}

.header-right{
  display:flex;
  gap:12px;
}

/* PERFECT HEADER UI */
.month{
  display:flex;
  align-items:center;
  gap:8px;
  background:#0f1435;
  padding:10px 16px;
  border-radius:12px;
  font-size:13px;
  color:#c7c9ff;
  border:1px solid rgba(255,255,255,0.08);
}

.month, .bell{
  transition:0.3s;
}

.month:hover, .bell:hover{
  box-shadow:0 0 15px rgba(139,92,246,0.4);
  transform:translateY(-2px);
}


.month svg{
  width:16px;
  height:16px;
}

.arrow{
  font-size:10px;
  opacity:0.7;
}

.bell{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f1435;
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
}

.bell svg{
  width:16px;
  height:16px;
}

.dot{
  position:absolute;
  top:5px;
  right:5px;
  width:6px;
  height:6px;
  background:#8b5cf6;
  border-radius:50%;
  box-shadow:0 0 6px #8b5cf6;
}



.planner{
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* header */
.planner-head{
  display:flex;
  align-items:center;
  gap:10px;
}

.planner-icon{
  width:18px;
  height:18px;
  border-radius:6px;
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  box-shadow:
    0 0 10px rgba(139,92,246,0.7),
    0 0 20px rgba(139,92,246,0.4);
}

/* inputs */
.planner-inputs{
  display:flex;
  gap:10px;
}

.input-box{
  flex:1;
  display:flex;
  align-items:center;
  gap:6px;
  background:#0f1435;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
  transition:0.2s;
}

.input-box:focus-within{
  border-color:#8b5cf6;
  box-shadow:0 0 10px rgba(139,92,246,0.4);
}

.input-box span{
  font-size:12px;
  color:#8b5cf6;
}

.input-box input{
  flex:1;
  background:transparent;
  border:none;
  color:#fff;
  outline:none;
}

/* presets */
.preset-row{
  display:flex;
  gap:8px;
}

.preset{
  flex:1;
  padding:6px;
  border:none;
  border-radius:8px;
  background:#121842;
  color:#c7c9ff;
  cursor:pointer;
  font-size:12px;
  transition:0.2s;
}

.preset:hover{
  background:#8b5cf6;
  color:#fff;
}


.month,
.bell{
  cursor: pointer;
}

#calcBtn,
.preset{
  cursor: pointer;
}


.day{
  cursor: pointer;
}


button,
.card,
.month,
.bell,
.day{
  cursor: pointer;
}

.input-box{
  cursor: text; /* input ke liye */
}

/* result */
.result{
  font-size:13px;
  padding:12px;
  border-radius:10px;
  background:#0f1435;
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
}

.result.good{
  color:#22c55e;
  box-shadow:0 0 10px rgba(34,197,94,0.3);
}

.result.bad{
  color:#ef4444;
  box-shadow:0 0 10px rgba(239,68,68,0.3);
}

.result.empty{
  color:#8c90b5;
}



/* BUTTON */
#calcBtn{
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  color:#fff;
  cursor:pointer;
  font-weight:500;
  transition:0.3s;
}

#calcBtn:hover{
  transform:translateY(-2px);
  box-shadow:
    0 0 15px rgba(139,92,246,0.6),
    0 0 30px rgba(139,92,246,0.3);
}

/* RESULT */
.result{
  font-size:13px;
  padding:10px;
  border-radius:10px;
  background:#0f1435;
  border:1px solid rgba(255,255,255,0.05);
}

.result.good{
  color:#22c55e;
}

.result.bad{
  color:#ef4444;
}


#calcBtn{
  padding:8px;
  border:none;
  border-radius:8px;
  background:#8b5cf6;
  color:#fff;
  cursor:pointer;
}

#resultBox{
  font-size:13px;
  color:#c7c9ff;
}

.bottom{
  display:grid;
  grid-template-columns:3fr 1fr;  
  gap:20px;
  margin-top:25px;
}

.calendar{
  width:100%;
}

.card{
  height:100%;
}
.card{
  width:100%;
}



.bottom{
  margin-top: 25px; 
}


/* CARD */
.card{
  background:linear-gradient(160deg,#0d1230,#0a0e27);
  border-radius:18px;
  padding:18px;

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  box-shadow:
    0 0 0.5px rgba(255,255,255,0.2),
    0 10px 30px rgba(0,0,0,0.6),
    0 0 30px rgba(139,92,246,0.12);

  transition:0.3s ease;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:
    0 0 0.5px rgba(255,255,255,0.3),
    0 15px 40px rgba(0,0,0,0.8),
    0 0 40px rgba(139,92,246,0.25);
}

/* CHART */
.chart{
  height:340px
}

/* PROGRESS */
.progress{
  text-align:center;
}

.circle-wrap{
  position:relative;
  width:180px;
  height:180px;
  margin:20px auto;
}

/* SVG glow */
.progress-ring{
  transform:rotate(-90deg);
  filter: drop-shadow(0 0 10px #8b5cf6)
          drop-shadow(0 0 25px rgba(139,92,246,0.6));
}

/* Smooth animation */
.progress-bar{
  transition: stroke-dashoffset 1s ease;
}

/* Center text */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.percent{
  font-size:34px;
  font-weight:700;
}

.sub{
  font-size:13px;
  color:#8c90b5;
}

/* Green badge */
.badge{
  margin-top:10px;
  background:#062c1b;
  color:#22c55e;
  font-size:12px;
  padding:6px 12px;
  border-radius:8px;
  display:inline-block;
}

.circle{
  width:160px;
  height:160px;
  border-radius:50%;

  background:
    conic-gradient(
      from 270deg,
      #8b5cf6 0% 75%,
      rgba(255,255,255,0.06) 75% 100%
    );

  mask: radial-gradient(circle, transparent 58%, black 59%);
  -webkit-mask: radial-gradient(circle, transparent 58%, black 59%);

  box-shadow:
    0 0 25px rgba(139,92,246,0.6),
    0 0 60px rgba(139,92,246,0.25);

  position:relative;
}

.circle{
  animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse{
  from{
    box-shadow:0 0 20px #8b5cf6;
  }
  to{
    box-shadow:0 0 40px #8b5cf6;
  }
}



.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:28px;
  font-weight:600;
  color:#fff;

  text-shadow:0 0 10px rgba(139,92,246,0.6);
}


.stats{
  display:flex;
  justify-content:space-between;
  margin-top:18px;
}

.stats h3{
  font-size:18px;
}

.stats p{
  font-size:12px;
  color:#8c90b5;
}

/* CALENDAR */
.calendar-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:15px;
}

/* LEFT */
.calendar-head .left{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:600;
}

/* MONTH NAV */
.month-nav{
  display:flex;
  align-items:center;
  gap:10px;
  background:#0f1435;
  padding:6px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
}

.month-nav button{
  background:none;
  border:none;
  color:#c7c9ff;
  cursor:pointer;
}

.month-nav span{
  color:#c7c9ff;
  font-size:14px;
}


.today-btn{
  background:#121842;
  border:none;
  color:#c7c9ff;
  padding:6px 12px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
}

.legend{
  display:flex;
  gap:20px;
  margin-top:10px;
  font-size:12px;
  color:#8c90b5;
}


.cal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0 14px;
}


.cal-icon{
  width:20px;
  height:20px;
  border-radius:6px;
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  box-shadow:
    0 0 10px rgba(139,92,246,0.7),
    0 0 20px rgba(139,92,246,0.4);
}

.calendar{
  width:100%;
}

.calendar-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.cal-header button{
  background:#121842;
  border:none;
  color:#fff;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.cal-header button:hover{
  background:#1a2060;
}

.cal-header span{
  font-size:14px;
  color:#c7c9ff;
  font-weight:500;
}

/* DAYS */
.cal-days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  text-align:center;
  font-size:12px;
  color:#8c90b5;
  margin-bottom:8px;
}
.calendar-grid{
  display:grid;                 
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  flex: 1;                     
}

.day{
 min-height:42px;
 height: 100%;
  border-radius:10px;
  font-size:13px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:#131844;
  font-weight:500;   
}

.day:hover{
  transform:scale(1.05);
  box-shadow:
    0 0 15px rgba(139,92,246,0.3);
}

/* HOVER EFFECT */
.day:hover{
  background:#1a2060;
}

/* STATUS COLORS */
.present{
  background:#22c55e;
  box-shadow:0 0 6px rgba(34,197,94,0.4);
}

.absent{
  background:#ef4444;
  box-shadow:0 0 6px rgba(239,68,68,0.4);
}


/* TODAY */
.today{
  border:2px solid #8b5cf6;
  box-shadow:0 0 10px rgba(139,92,246,0.5);
}


/* DATES */
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  margin-top:10px;
}


/* RECENT */
.item{
  background:#0f1435;
  border-radius:10px;

  box-shadow:
    inset 0 0 5px rgba(255,255,255,0.03),
    0 0 10px rgba(0,0,0,0.4);

  transition:0.2s;
}

.item:hover{
  transform:translateX(5px);
  box-shadow:
    0 0 20px rgba(139,92,246,0.3);
}

.item.present{ border-left:4px solid #22c55e; }
.item.absent{ border-left:4px solid #ef4444; }

 /* Attendence Card*/

.title{
  display:flex;
  align-items:center;   
  gap:8px;
  font-size:16px;
}

.title .icon{
  font-size:16px;
  display:flex;
  align-items:center;
}


.back-btn{
  background:#0f1435;
  border:1px solid rgba(255,255,255,0.08);
  color:#c7c9ff;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
 margin-bottom:20px;
  transition:0.3s;
}

.back-btn{
  margin-left:15px;
}

.back-btn:hover{
  background:#8b5cf6;
  color:#fff;
  box-shadow:0 0 15px rgba(139,92,246,0.5);
}

/* ============================================================
   RESPONSIVE — Attendance Page
   ============================================================ */

/* Tablet (max 1024px) */
@media (max-width: 1024px) {
  .top {
    grid-template-columns: 1fr;
  }

  .bottom {
    grid-template-columns: 1fr;
  }

  .wrapper {
    padding: 0 16px;
  }
}

/* Mobile (max 768px) */
@media (max-width: 768px) {
  body {
    padding: 16px 0;
  }

  .wrapper {
    padding: 0 12px;
  }

  /* Header stack karo */
  .header {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }

  .header h1 {
    font-size: clamp(1.3rem, 5vw, 1.8rem);
  }

  .header-right {
    width: 100%;
    justify-content: flex-start;
    flex-wrap: wrap;
    gap: 8px;
  }

  .month {
    font-size: 12px;
    padding: 8px 12px;
  }

  /* Top grid — single column */
  .top {
    grid-template-columns: 1fr;
    gap: 14px;
  }

  /* Chart height chhota */
  .chart {
    height: 240px;
  }

  /* Progress circle thoda chhota */
  .circle-wrap {
    width: 150px;
    height: 150px;
    margin: 14px auto;
  }

  .progress-ring {
    width: 150px;
    height: 150px;
  }

  .progress-ring circle {
    cx: 75;
    cy: 75;
    r: 58;
  }

  .percent {
    font-size: 26px;
  }

  /* Bottom grid — single column */
  .bottom {
    grid-template-columns: 1fr;
    margin-top: 14px;
    gap: 14px;
  }

  /* Calendar grid — smaller cells */
  .calendar-grid {
    gap: 4px;
  }

  .day {
    min-height: 34px;
    font-size: 11px;
    border-radius: 7px;
  }

  /* Calendar head — stack */
  .calendar-head {
    flex-wrap: wrap;
    gap: 8px;
  }

  .month-nav {
    padding: 5px 10px;
    font-size: 13px;
  }

  /* Planner inputs — stack vertically */
  .planner-inputs {
    flex-direction: column;
    gap: 8px;
  }

  .input-box {
    width: 100%;
  }

  /* Stats bar */
  .stats {
    gap: 10px;
  }

  .stats h3 {
    font-size: 15px;
  }

  /* Back button */
  .back-btn {
    margin: 10px 0 14px 0;
    font-size: 12px;
    padding: 6px 12px;
  }

  /* Cards */
  .card {
    padding: 14px;
  }
}

/* Very small (max 400px) */
@media (max-width: 400px) {
  .day {
    min-height: 28px;
    font-size: 10px;
  }

  .preset-row {
    flex-wrap: wrap;
  }

  .preset {
    flex: 1 1 40%;
  }

  .header h1 {
    font-size: 1.2rem;
  }
}

</style>
</head>

<body>
<button class="back-btn" onclick="window.location.href='index.html'">
  ← Back
</button>
<div class="wrapper">

<div class="header">
  <div>
    <h1>Presence Analytics</h1>
    <p>Track your attendance statistics and history</p>
  </div>


  <div class="header-right">




<select id="monthSelect" class="month">

  <!-- ✅ ADD THIS -->

  <div class="cal-days">

  <!--  existing calendar-grid start hoga -->
 
  <div class="calendar-grid"></div>



</div>

  <!-- inputs -->

    <label class="input-box">

    <label class="input-box">
      <span>%</span>

  <!-- quick presets -->

  <div class="preset-row">

</div>


 
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.querySelector("canvas").getContext("2d");


// 🔥 Gradient (purple glow)

const gradient = ctx.createLinearGradient(0, 0, 0, 300);
gradient.addColorStop(0, "rgba(139,92,246,0.6)");
gradient.addColorStop(1, "rgba(139,92,246,0)");



//Chart 

const chart = new Chart(ctx, {
   plugins: [{
    beforeDatasetsDraw(chart) {
      const {ctx, chartArea} = chart;

      chart.data.datasets[0].data.forEach((value, index) => {
        const x = chart.scales.x.getPixelForValue(index);
        const y = chart.scales.y.getPixelForValue(value);

        ctx.fillStyle = "rgba(139,92,246,0.25)";
        ctx.fillRect(x - 8, y, 16, chartArea.bottom - y);
      });
    }
  }],
  type: "line",
  data: {

<script type="module">  

  import { 
  getFirestore, 
  doc, 
  setDoc, 
  getDocs, 
  deleteDoc,
  collection 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";


// ================= CONFIG =================



import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCndFVMS1yN3JMWdhT0t4RvI9JdLJCxm-I",
  authDomain: "studysync-pro-3472f.firebaseapp.com",
  projectId: "studysync-pro-3472f",
  storageBucket: "studysync-pro-3472f.firebasestorage.app",
  messagingSenderId: "413526499384",
  appId: "1:413526499384:web:287e5cd353be8e3efbc6cd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


let currentUserId = null;
let STORAGE_KEY = null;





// 🔥 USER AUTH CHECK 

onAuthStateChanged(auth, (user) => {
  if(user){
    currentUserId = user.uid;

    // 🔥 calendar load

    renderCalendar();

    // 🔥 ADD THESE (IMPORTANT)

    updateChart();
    updateTrend();

  } else {
    window.location.href = "login.html";
  }
});






// ================= STORAGE =================

// 🔥 Firestore load

async function loadData(){
  const user = auth.currentUser;
  if(!user) return {};

  const snap = await getDocs(
    collection(db, "users", user.uid, "attendance")
  );

  let data = {};

  snap.forEach(doc=>{
    data[doc.id] = doc.data().status;
  });

  return data;
}


// 🔥 Firestore save

async function saveData(key, value){
  const user = auth.currentUser;
  if(!user) return;

  const ref = doc(db, "users", user.uid, "attendance", key);

  if(value === null){
  // 🔥 REAL DELETE
  await deleteDoc(ref);
} else {
  await setDoc(ref, { status: value });
}
}


// ================= CALENDAR =================

async function renderCalendar(){
  const grid = document.querySelector(".calendar-grid");
  grid.innerHTML = "";

  const data = await loadData();

  let year = currentDate.getFullYear();
  let month = currentDate.getMonth();

  document.getElementById("monthLabel").innerText =
    currentDate.toLocaleString("default",{month:"long",year:"numeric"});

  let firstDay = new Date(year, month, 1).getDay();
  let totalDays = new Date(year, month+1, 0).getDate();

  // empty slots

  for(let i=0;i<firstDay;i++){
    grid.innerHTML += `<div class="day"></div>`;
  }

  for(let d=1; d<=totalDays; d++){
    let key = `${year}-${month}-${d}`;
    let status = data[key] || "";

    grid.innerHTML += `
      <div class="day ${status}" data-key="${key}">
        ${d}
      </div>
    `;
  }

  await attachClick();
  updateStats();
}


// ================= CLICK =================

async function attachClick(){
  const data = await loadData();

  document.querySelectorAll(".day").forEach(day=>{
    day.onclick = ()=>{

      let key = day.dataset.key;
      if(!key) return;

     if(day.classList.contains("present")){
  day.classList.remove("present");
  day.classList.add("absent");
  data[key] = "absent";
  saveData(key, "absent");   
}
else if(day.classList.contains("absent")){
  day.classList.remove("absent");
  delete data[key];

  // 🔥 correct delete (Firestore se remove)
  
  saveData(key, null);
}
else{
  day.classList.add("present");
  data[key] = "present";
  saveData(key, "present");  
}
      updateStats();
    };
  });
}







// ================= STATS =================

function updateStats(){
  let present = document.querySelectorAll(".day.present").length;
  let absent = document.querySelectorAll(".day.absent").length;
  let total = present + absent;

  document.querySelector(".stats").innerHTML = `
    <div><h3>${present}</h3><p>Present</p></div>
    <div><h3>${absent}</h3><p>Absent</p></div>
    <div><h3>${total}</h3><p>Total</p></div>
  `;

  updateCircle(present, total);
  updatePlanner(present, absent);
  updateChart();   
  updateTrend(); 
}

let currentDate = new Date();








// ================= SVG CIRCLE FIX =================

function updateCircle(present,total){
  if(total===0) return;

  let percent = Math.round((present / total) * 100);

  document.querySelector(".percent").innerText = percent + "%";

  let circle = document.querySelector(".progress-bar");
  let circumference = 440;

  let offset = circumference - (percent/100)*circumference;
  circle.style.strokeDashoffset = offset;
}



// ================= PLANNER =================

document.getElementById("calcBtn")?.addEventListener("click", calculate);

document.querySelectorAll(".preset").forEach(btn=>{
  btn.onclick=()=>{
    document.getElementById("target").value = btn.dataset.t;
    calculate();
  }
});

function calculate(){
  let p = parseInt(document.getElementById("present").value)||0;
  let a = parseInt(document.getElementById("absent").value)||0;
  let target = parseInt(document.getElementById("target").value)||75;

  let total = p+a;
  if(total===0) return;

  let current = (p/total)*100;

  let result = document.getElementById("resultBox");

  if(current >= target){
    result.className="result good";
    result.innerText="✔ Target achieved";
  }else{
    let need = Math.ceil(((target*total)/100)-p);
    result.className="result bad";
    result.innerText=`Attend ${need} more classes`;
  }
}

function updatePlanner(p,a){
  document.getElementById("present").value = p;
  document.getElementById("absent").value = a;
}


// ================= NAVIGATION =================

document.getElementById("prevMonth").onclick=()=>{
  currentDate.setMonth(currentDate.getMonth()-1);
  renderCalendar();
};

document.getElementById("nextMonth").onclick=()=>{
  currentDate.setMonth(currentDate.getMonth()+1);
  renderCalendar();
};




// ================= BACK =================

function goDashboard(){
  window.location.href="index.html";
}


// ================= CHART UPDATE =================

async function updateChart(){
  const data = await loadData();



let present = new Array(12).fill(0);
let total = new Array(12).fill(0);

Object.keys(data).forEach(key=>{
  let [y,m,d] = key.split("-");
  y = parseInt(y);
  m = parseInt(m);

  if(y === currentDate.getFullYear()){
    total[m]++;

    if(data[key] === "present"){
      present[m]++;
    }
  }
});

// 🔥 convert to percentage

let values = present.map((p, i)=>{
  return total[i] ? Math.round((p / total[i]) * 100) : 0;
});

  chart.data.datasets[0].data = values;
  chart.update();
}




//==========Oher Something=================

document.querySelector(".today-btn").onclick = () => {
  currentDate = new Date();
  renderCalendar();
};



//================= Month Selector=====================//

document.getElementById("monthSelect").onchange = (e) => {
  currentDate.setMonth(parseInt(e.target.value));
  renderCalendar();
};

function syncMonthDropdown(){
  document.getElementById("monthSelect").value = currentDate.getMonth();
}

syncMonthDropdown();







// 🔥 async 

async function updateTrend(){
  const data = await loadData();

  let currentYear = currentDate.getFullYear();
  let currentMonth = currentDate.getMonth();
  let prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;

  let currentPresent = 0;
  let prevPresent = 0;

  let currentTotal = 0;
  let prevTotal = 0;

  Object.keys(data).forEach(key=>{
    let [y,m,d] = key.split("-");
    y = parseInt(y);
    m = parseInt(m);

    if(y === currentYear){
      if(m === currentMonth){
        currentTotal++;
        if(data[key] === "present") currentPresent++;
      }

      if(m === prevMonth){
        prevTotal++;
        if(data[key] === "present") prevPresent++;
      }
    }
  });

  let badge = document.getElementById("trendBadge");

  if(prevTotal === 0){
    badge.innerText = "No previous data";
    return;
  }

  let currentPercent = currentTotal ? (currentPresent/currentTotal)*100 : 0;
  let prevPercent = prevTotal ? (prevPresent/prevTotal)*100 : 0;

  let percent = Math.round(currentPercent - prevPercent);

  if(percent >= 0){
    badge.innerText = `▲ ${percent}% from last month`;
    badge.style.color = "#22c55e";
  }else{
    badge.innerText = `▼ ${Math.abs(percent)}% from last month`;
    badge.style.color = "#ef4444";
  }
}

</script>
